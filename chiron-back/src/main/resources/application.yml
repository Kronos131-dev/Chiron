server:
  port: 9090
  forward-headers-strategy: framework

spring:
  application:
    name: chiron
  datasource:
    url: jdbc:postgresql://127.0.0.1:5454/chiron_db
    username: chiron_user
    password: chiron_password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${GMAIL_USERNAME:}
    password: ${GMAIL_APP_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

langchain4j:
  mistral-ai:
    chat-model:
      api-key: ${MISTRAL_API_KEY}
      model-name: mistral-large-latest

jwt:
  # Expiration du token (ex: 2592000000ms = 30 jours)
  expiration: 2592000000

chiron:
  uploads-dir: ${UPLOADS_DIR:./uploads/images}
  frontend-url: ${FRONTEND_URL:http://localhost:4200}
