name: Deploy Chiron

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'Cible de déploiement'
        required: true
        default: 'production'
        type: choice
        options:
          - production

env:
  JAVA_VERSION: '17'
  NODE_VERSION: '22'
  SERVER_HOST: 46.224.227.209
  DEPLOY_DIR: /opt/chiron

jobs:

  # ── 1. Build backend ─────────────────────────────────────────────────────────
  build-backend:
    name: Build Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Package JAR
        working-directory: chiron-back
        run: mvn package -DskipTests --no-transfer-progress

      # Le finalName dans pom.xml force le nom à app.jar
      - name: Vérification du JAR
        run: ls -lh chiron-back/target/app.jar

      - uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: chiron-back/target/app.jar
          retention-days: 1

  # ── 2. Build frontend ─────────────────────────────────────────────────────────
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: chiron-front/package-lock.json

      - name: Install dependencies
        working-directory: chiron-front
        run: npm ci

      - name: Build production
        working-directory: chiron-front
        run: npm run build -- --configuration production

      - name: Vérification du build
        run: |
          echo "Contenu de dist/ :"
          find chiron-front/dist -type f | head -20

      # Angular 17+ avec @angular/build:application → dist/chiron-front/browser/
      - uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: chiron-front/dist/chiron-front/browser/
          retention-days: 1

  # ── 3. Deploy SSH ─────────────────────────────────────────────────────────────
  deploy:
    name: Deploy → ${{ inputs.target }}
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    environment: ${{ inputs.target }}

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: backend-jar
          path: artifacts/

      - uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: artifacts/frontend/

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ env.SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Upload JAR
        run: |
          scp -i ~/.ssh/deploy_key \
            artifacts/app.jar \
            ${{ secrets.SSH_USER }}@${{ env.SERVER_HOST }}:/tmp/chiron-app.jar

      - name: Upload frontend
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/deploy_key" \
            artifacts/frontend/ \
            ${{ secrets.SSH_USER }}@${{ env.SERVER_HOST }}:/tmp/chiron-frontend/

      - name: Deploy on server
        run: |
          ssh -i ~/.ssh/deploy_key \
            ${{ secrets.SSH_USER }}@${{ env.SERVER_HOST }} \
            'bash -s' << 'ENDSSH'

            set -e
            DEPLOY_DIR=/opt/chiron

            echo "▶ Arrêt du backend..."
            sudo systemctl stop chiron-back

            echo "▶ Mise à jour du JAR..."
            sudo cp /tmp/chiron-app.jar $DEPLOY_DIR/app.jar

            echo "▶ Mise à jour du frontend..."
            sudo rsync -a --delete /tmp/chiron-frontend/ $DEPLOY_DIR/frontend/
            sudo chown -R www-data:www-data $DEPLOY_DIR/frontend/

            echo "▶ Démarrage du backend..."
            sudo systemctl start chiron-back

            echo "▶ Rechargement nginx..."
            sudo nginx -t && sudo systemctl reload nginx

            echo "▶ Nettoyage..."
            rm -f /tmp/chiron-app.jar
            rm -rf /tmp/chiron-frontend/

            echo "✓ Déploiement terminé"
          ENDSSH

      - name: Health check
        run: |
          echo "Attente démarrage Spring Boot (20s)..."
          sleep 20
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            http://${{ env.SERVER_HOST }}:9090/actuator/health || echo "000")
          if [ "$STATUS" = "200" ]; then
            echo "✓ Backend UP"
          else
            echo "⚠ Health check: HTTP $STATUS"
          fi
