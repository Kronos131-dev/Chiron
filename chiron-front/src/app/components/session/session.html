<app-header [title]="'SÉANCE'" [showBack]="true" [backRoute]="'/programmes'"></app-header>

<!-- Main Session Interface -->
<main class="min-h-screen pt-20 pb-32 bg-slate-950 heroic-texture relative">

  <!-- Session Title and Global Actions Section -->
  <section class="px-6 py-10 relative overflow-hidden">
    <!-- Decorative Gradient -->
    <div class="absolute top-0 left-0 w-full h-full bg-gradient-to-b from-slate-800/40 to-transparent pointer-events-none"></div>

    <div class="max-w-md mx-auto relative z-10 space-y-4">
      <!-- Editable/Read-only Title Input -->
      <div>
        <p class="text-secondary text-[10px] font-bold tracking-[0.25em] uppercase mb-1">Séance</p>
        <input type="text"
               [ngModel]="titreRoutine()"
               (ngModelChange)="titreRoutine.set($event)"
               [readOnly]="isReadonly()"
               class="w-full bg-transparent border-b-2 border-transparent hover:border-white/10 focus:border-secondary outline-none font-headline text-3xl md:text-4xl font-black text-white uppercase tracking-tight pb-1 transition-colors"
               placeholder="NOM DE LA ROUTINE" />
      </div>

      <!-- Action Buttons (Hidden in Read-only Mode) -->
      @if (!isReadonly()) {
        <div class="flex justify-between items-end pt-2">
          <!-- Last Session Date Display -->
          <p class="text-on-surface-variant text-[10px] font-bold tracking-widest uppercase">Dernière session : {{ derniereSession() }}</p>

          <!-- Save to Journal (History) Button — editing the underlying template lives
               in the dedicated Builder page now. -->
          <button (click)="ajouterAuJournal()"
                  class="bg-gradient-to-r from-blue-500 to-blue-700 text-white font-bold text-xs px-6 py-2 rounded uppercase tracking-widest hover:scale-105 active:scale-95 transition-all shadow-lg shadow-blue-500/20 flex items-center justify-center gap-2">
            <span class="material-symbols-outlined text-sm">add_task</span>
            Ajouter au journal
          </button>
        </div>

        <!-- Transient status message (auto-clears after 3s) -->
        @if (saveStatus()) {
          <p class="text-secondary text-xs font-bold tracking-widest uppercase text-right pt-2 animate-pulse">
            {{ saveStatus() }}
          </p>
        }
      }
    </div>
  </section>

  <!-- Exercises List Section -->
  <section class="px-4 md:px-8">
    <div class="max-w-md mx-auto space-y-6">

      @for (exo of exercices(); track exo.id; let i = $index) {
        <app-exercice-card
          [exercice]="exo"
          [readonly]="isReadonly()"
          [index]="i"
          [isDragging]="dragFromIdx() === i"
          [isDropTarget]="dragOverIdx() === i && dragFromIdx() !== i"
          (remove)="supprimerExercice(exo.id)"
          (exoDragStart)="onExoDragStart($event.event, i, $event.cardEl)"
          (exoDragOver)="onExoDragOver($event, i)"
          (exoDrop)="onExoDrop($event, i)"
          (exoDragEnd)="onExoDragEnd()"
          (exoTouchStart)="onExoTouchStart($event, i)"
          (exoTouchMove)="onExoTouchMove($event)"
          (exoTouchEnd)="onExoTouchEnd()"
        />
      }

      <!-- Add Exercise Button → opens the library picker -->
      @if (!isReadonly()) {
        <button (click)="openPicker()"
                class="w-full mt-8 bg-[#1a1c23]/50 border-2 border-dashed border-secondary/30 rounded-xl p-6 flex flex-col items-center justify-center gap-3 text-secondary hover:bg-secondary/10 hover:border-secondary/60 transition-all group">
          <div class="w-12 h-12 rounded-full bg-secondary/15 flex items-center justify-center group-hover:bg-secondary/25 group-hover:scale-110 transition-all">
            <span class="material-symbols-outlined text-2xl">add</span>
          </div>
          <span class="text-xs font-bold tracking-[0.2em] uppercase">Ajouter un exercice</span>
        </button>
      }

    </div>
  </section>
</main>

<app-exercise-picker
  [open]="pickerOpen()"
  [addedExercises]="addedExercises()"
  (closeRequest)="closePicker()"
  (addFromDefinition)="addExerciceFromDefinition($event)"
  (addCustom)="addCustomExercice()"
  (removeAdded)="removeAddedFromPicker($event)"
/>
