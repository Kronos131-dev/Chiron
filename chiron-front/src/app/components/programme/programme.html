<app-header [title]="'PROGRAMMES'" [showBack]="false"></app-header>

<main class="min-h-screen pt-24 pb-32 heroic-texture px-4 md:px-8">
  <div class="max-w-md mx-auto space-y-6">

    <!-- Page Title -->
    <div class="mb-8">
      <p class="text-secondary text-xs font-bold tracking-[0.2em] uppercase mb-1">Le Sanctuaire</p>
      <h2 class="font-headline text-4xl font-black text-on-surface uppercase tracking-tight">PROGRAMMES</h2>
      <div class="h-1 w-12 bg-secondary mt-2 rounded-full"></div>
    </div>

    <!-- Loading -->
    @if (isLoading()) {
      <div class="flex justify-center py-20">
        <span class="w-12 h-12 border-4 border-secondary/20 border-t-secondary rounded-full animate-spin"></span>
      </div>
    }

    <!-- Program List -->
    <div class="space-y-4">
      @for (routine of routines(); track routine.id; let i = $index) {

        <article #card
                 [attr.data-idx]="i"
                 class="programme-card relative group bg-slate-900 border rounded-2xl overflow-hidden shadow-lg transition-all duration-200"
                 [class.is-dragging]="dragFromIdx() === i"
                 [class.is-drop-target]="dragOverIdx() === i && dragFromIdx() !== i"
                 (dragover)="onDragOver($event, i)"
                 (drop)="onDrop($event, i)"
                 (dragend)="onDragEnd()">

          <div class="p-6 relative z-10">

            <!-- Top row: drag handle + title + actions -->
            <div class="flex items-start gap-3">

              <!-- Drag handle -->
              <div class="drag-handle flex-shrink-0 mt-1 cursor-grab active:cursor-grabbing"
                   [draggable]="true"
                   (dragstart)="onDragStart($event, i, card)"
                   (touchstart)="onTouchStart($event, i)"
                   (touchmove)="onTouchMove($event)"
                   (touchend)="onTouchEnd()">
                <span class="material-symbols-outlined text-secondary/30 group-hover:text-secondary/60 transition-colors select-none">
                  drag_indicator
                </span>
              </div>

              <!-- Title -->
              <div class="flex-1 min-w-0">
                <h3 class="font-headline text-2xl font-black text-white tracking-wide uppercase break-words leading-tight">{{ routine.titre }}</h3>
                <p class="text-on-surface-variant text-xs font-bold tracking-widest uppercase mt-1">{{ routine.sousTitre }}</p>
              </div>

              <!-- Edit & Delete -->
              <div class="flex items-center gap-2 flex-shrink-0">
                <button (click)="editerRoutine(routine.id)"
                        class="w-8 h-8 rounded bg-white/5 flex items-center justify-center text-secondary hover:bg-secondary/20 transition-colors cursor-pointer">
                  <span class="material-symbols-outlined text-sm">edit</span>
                </button>
                <button (click)="supprimerRoutine(routine.id)"
                        class="w-8 h-8 rounded bg-red-900/20 flex items-center justify-center text-red-400 hover:bg-red-900/40 transition-colors cursor-pointer">
                  <span class="material-symbols-outlined text-sm">delete</span>
                </button>
              </div>
            </div>

            <!-- Footer: series count + start -->
            <div class="flex items-end justify-between mt-6">
              <div class="flex items-baseline gap-2">
                <span class="text-4xl font-headline font-light text-secondary">{{ routine.totalSeries }}</span>
                <span class="text-xs text-on-surface-variant font-bold uppercase tracking-wider">Séries<br>Totales</span>
              </div>
              <button (click)="commencerRoutine(routine.id)"
                      class="bg-gradient-to-r from-secondary to-[#c77a30] text-slate-950 font-bold text-xs px-6 py-3 rounded-lg uppercase tracking-widest hover:scale-105 active:scale-95 transition-transform shadow-lg shadow-secondary/20">
                Commencer
              </button>
            </div>
          </div>

          <!-- Decorative glow -->
          <div class="absolute -right-10 -top-10 w-40 h-40 bg-secondary/5 rounded-full blur-3xl group-hover:bg-secondary/10 transition-colors pointer-events-none"></div>
        </article>
      }
    </div>

    <!-- Add Program -->
    <button (click)="ajouterRoutine()"
            class="w-full mt-6 border-2 border-dashed border-white/10 rounded-2xl p-6 flex flex-col items-center justify-center gap-3 text-on-surface-variant hover:text-secondary hover:border-secondary/50 hover:bg-secondary/5 transition-all duration-300 group">
      <span class="material-symbols-outlined text-3xl group-hover:scale-110 transition-transform bg-white/5 p-2 rounded-full">add</span>
      <span class="text-xs font-bold tracking-[0.15em] uppercase">Ajouter un Programme</span>
    </button>

  </div>
</main>
