<!-- Top Navigation Header -->
<header class="bg-slate-950/80 backdrop-blur-md flex items-center justify-between px-6 py-4 w-full fixed top-0 z-50 border-b border-secondary/10">
  <div class="flex items-center gap-3">
    <span class="material-symbols-outlined text-secondary">menu</span>
    <h1 class="text-2xl font-black text-[#f8fafc] tracking-widest font-headline uppercase">CHIRON</h1>
  </div>
  <a href="/profile" class="material-symbols-outlined text-[#f8fafc] hover:text-secondary transition-colors cursor-pointer">
    account_circle
  </a>
</header>

<!-- Main Programs Content Area -->
<main class="min-h-screen pt-24 pb-32 heroic-texture px-4 md:px-8">
  <div class="max-w-md mx-auto space-y-6">

    <!-- Page Title & Subtitle -->
    <div class="mb-8">
      <p class="text-secondary text-xs font-bold tracking-[0.2em] uppercase mb-1">Le Sanctuaire</p>
      <h2 class="font-headline text-4xl font-black text-on-surface uppercase tracking-tight">PROGRAMMES</h2>
      <div class="h-1 w-12 bg-secondary mt-2 rounded-full"></div>
    </div>

    <!-- List of Saved Programs (Templates) -->
    <div class="space-y-4">
      @for (routine of routines(); track routine.id) {

        <!-- Individual Program Card -->
        <article class="relative group bg-slate-900 border border-white/5 rounded-2xl p-6 overflow-hidden shadow-lg transition-all duration-300 hover:border-secondary/30">

          <!-- Background Decorative Glow -->
          <div class="absolute -right-10 -top-10 w-40 h-40 bg-secondary/5 rounded-full blur-3xl group-hover:bg-secondary/10 transition-colors"></div>

          <div class="relative z-10">
            <!-- Card Header: Title and Actions -->
            <div class="flex justify-between items-start mb-6">
              <div>
                <h3 class="font-headline text-2xl font-black text-white tracking-wide uppercase">{{ routine.titre }}</h3>
                <p class="text-on-surface-variant text-xs font-bold tracking-widest uppercase mt-1">{{ routine.sousTitre }}</p>
              </div>

              <!-- Edit and Delete Actions -->
              <div class="flex items-center gap-2">
                <button (click)="editerRoutine(routine.id)"
                        class="w-8 h-8 rounded bg-white/5 flex items-center justify-center text-secondary hover:bg-secondary/20 transition-colors cursor-pointer z-10">
                  <span class="material-symbols-outlined text-sm">edit</span>
                </button>
                <button (click)="supprimerRoutine(routine.id)"
                        class="w-8 h-8 rounded bg-red-900/20 flex items-center justify-center text-red-400 hover:bg-red-900/40 transition-colors cursor-pointer z-10">
                  <span class="material-symbols-outlined text-sm">delete</span>
                </button>
              </div>
            </div>

            <!-- Card Footer: Statistics and Start Button -->
            <div class="flex items-end justify-between mt-8">
              <div class="flex items-baseline gap-2">
                <span class="text-4xl font-headline font-light text-secondary">{{ routine.totalSeries }}</span>
                <span class="text-xs text-on-surface-variant font-bold uppercase tracking-wider">Séries<br>Totales</span>
              </div>

              <!-- Start Workout Button -->
              <button (click)="commencerRoutine(routine.id)"
                      class="bg-gradient-to-r from-secondary to-[#c77a30] text-slate-950 font-bold text-xs px-6 py-3 rounded-lg uppercase tracking-widest hover:scale-105 active:scale-95 transition-transform shadow-lg shadow-secondary/20">
                Commencer
              </button>
            </div>
          </div>
        </article>
      }
    </div>

    <!-- Add New Program Button -->
    <button (click)="ajouterRoutine()"
            class="w-full mt-6 border-2 border-dashed border-white/10 rounded-2xl p-6 flex flex-col items-center justify-center gap-3 text-on-surface-variant hover:text-secondary hover:border-secondary/50 hover:bg-secondary/5 transition-all duration-300 group">
      <span class="material-symbols-outlined text-3xl group-hover:scale-110 transition-transform bg-white/5 p-2 rounded-full">add</span>
      <span class="text-xs font-bold tracking-[0.15em] uppercase">Ajouter un Programme</span>
    </button>

  </div>
</main>
