<div class="min-h-screen greek-bg heroic-texture flex items-center justify-center px-4">
  <div class="login-container bg-surface w-full max-w-md">
    <h2>Nouveau mot de passe</h2>

    @if (successMessage()) {
      <div class="bg-emerald-500/10 border border-emerald-500/30 rounded-xl px-4 py-3 text-emerald-400 text-sm mb-4">
        {{ successMessage() }}
      </div>
    }

    @if (errorMessage()) {
      <div class="error-message">{{ errorMessage() }}</div>
    }

    @if (!successMessage()) {
      <form (ngSubmit)="onSubmit()">
        <div class="form-group">
          <label for="newPassword">Nouveau mot de passe</label>
          <input type="password" id="newPassword" [(ngModel)]="newPassword" name="newPassword" required>
        </div>
        <div class="form-group">
          <label for="confirmPassword">Confirmer le mot de passe</label>
          <input type="password" id="confirmPassword" [(ngModel)]="confirmPassword" name="confirmPassword" required>
        </div>
        <button type="submit" [disabled]="isLoading() || !newPassword || !confirmPassword">
          <span *ngIf="isLoading()">En cours...</span>
          <span *ngIf="!isLoading()">Réinitialiser</span>
        </button>
      </form>
    }
  </div>
</div>
